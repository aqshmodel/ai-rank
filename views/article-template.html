<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>{{title}} — THE AI RANK</title>
  <meta name="description" content="{{description}}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:image" content="{{ogImage}}" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://ai-rank.aqsh.co.jp/articles/{{slug}}" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{title}}" />
  <meta name="twitter:description" content="{{description}}" />
  <meta name="twitter:image" content="{{ogImage}}" />

  <link rel="canonical" href="https://ai-rank.aqsh.co.jp/articles/{{slug}}" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  
  <style>
    /* Article Layout & Typography */
    .article-layout {
      max-width: 800px;
      margin: 0 auto;
      padding: 140px 24px 100px;
      min-height: 100vh;
    }
    .article-header {
      margin-bottom: 60px;
      text-align: left;
    }
    .article-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 16px;
      font-family: var(--font-ja);
    }
    .article-meta {
      display: flex;
      gap: 16px;
      color: var(--ink-muted);
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }
    
    /* Markdown Body Styling */
    .md-body {
      color: var(--ink);
      line-height: 1.9;
      font-size: 1.125rem;
    }
    .md-body h2 {
      font-size: 1.75rem;
      color: var(--accent);
      margin-top: 60px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .md-body h3 {
      font-size: 1.35rem;
      margin-top: 40px;
      margin-bottom: 16px;
    }
    .md-body p {
      margin-bottom: 24px;
    }
    .md-body img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 32px 0;
      border: 1px solid var(--border);
    }
    .md-body ul, .md-body ol {
      margin-bottom: 24px;
      padding-left: 24px;
    }
    .md-body li {
      margin-bottom: 8px;
    }
    .md-body blockquote {
      margin: 32px 0;
      padding: 16px 24px;
      border-left: 4px solid var(--accent);
      background: rgba(255, 255, 255, 0.3);
      color: var(--ink-soft);
    }
    .md-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>

  <div class="grain" aria-hidden="true"></div>

  <!-- Global Header (Same as THE AI RANK) -->
  <header class="masthead">
    <div class="masthead-col left">
      <div class="masthead-logo mono">
        <a href="/">THE AI RANK</a><br/><span class="dim">journal</span>
      </div>
    </div>
    <div class="masthead-col right">
      <nav class="masthead-nav">
        <a href="/" class="masthead-link mono small">RANK診断へ戻る</a>
      </nav>
    </div>
  </header>

  <!-- Article Container -->
  <main class="article-layout">
    <article>
      <header class="article-header">
        <h1 class="article-title">{{title}}</h1>
        <div class="article-meta mono">
          <span>PUBLISHED: {{date}}</span>
        </div>
      </header>
      <div class="md-body">
        {{content}}
      </div>
    </article>
    
    <div style="margin-top:80px; text-align:center; padding-top:40px; border-top:1px solid var(--border);">
      <p class="mono small dim" style="margin-bottom:16px;">AIに関する経営課題のご相談はこちらから</p>
      <a href="https://aqsh.co.jp/contact/" target="_blank" rel="noopener" class="cta-button" style="text-decoration:none;">
        <span class="mono">▸</span>
        <span>Aqsh株式会社にお問い合わせ</span>
      </a>
    </div>
  </main>

  <footer class="colophon">
    <div class="colophon-mark" style="text-align: center; padding-bottom: 40px;">
      <span class="mono small dim">© 2026 Aqsh Inc.</span>
    </div>
  </footer>

</body>
</html>
